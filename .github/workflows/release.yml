name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    name: Build Windows x64 Package
    runs-on: windows-latest
    env:
      ARCHIVE_PATH: ${{ github.workspace }}\artifacts\release\SharpEmu-win-x64.zip
      DOTNET_NOLOGO: true
      NUGET_PACKAGES: ${{ github.workspace }}\.nuget\packages
      PUBLISH_DIR: ${{ github.workspace }}\artifacts\publish\win-x64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate documentation
        shell: pwsh
        run: ./scripts/validate-docs.ps1

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.301
          cache: true
          cache-dependency-path: |
            Directory.Packages.props
            src/**/packages.lock.json
            tests/**/packages.lock.json

      - name: Restore solution
        run: dotnet restore SharpEmu.slnx --locked-mode

      - name: Build solution
        run: dotnet build SharpEmu.slnx --configuration Release --no-restore

      - name: Test solution
        run: dotnet test SharpEmu.slnx --configuration Release --no-build --no-restore

      - name: Publish Windows x64 CLI
        run: >-
          dotnet publish src/SharpEmu.CLI/SharpEmu.CLI.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          --no-restore
          -p:PublishDir="${env:PUBLISH_DIR}"

      - name: Create release archive
        shell: pwsh
        run: |
          $archiveDirectory = Split-Path -Parent $env:ARCHIVE_PATH
          New-Item -ItemType Directory -Path $archiveDirectory -Force | Out-Null

          if (Test-Path -LiteralPath $env:ARCHIVE_PATH) {
            Remove-Item -LiteralPath $env:ARCHIVE_PATH -Force
          }

          Compress-Archive `
            -Path (Join-Path $env:PUBLISH_DIR "*") `
            -DestinationPath $env:ARCHIVE_PATH `
            -CompressionLevel Optimal

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: SharpEmu-win-x64
          path: ${{ env.ARCHIVE_PATH }}
          if-no-files-found: error

  github-release:
    name: Publish Tagged GitHub Release
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download workflow artifact
        uses: actions/download-artifact@v8
        with:
          name: SharpEmu-win-x64
          path: release

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          asset_path="release/SharpEmu-win-x64.zip"
          notes="SharpEmu Windows x64 build for ${RELEASE_TAG}."

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" "${asset_path}" --clobber
            gh release edit "${RELEASE_TAG}" --notes "${notes}"
          else
            gh release create "${RELEASE_TAG}" "${asset_path}" \
              --title "SharpEmu ${RELEASE_TAG}" \
              --notes "${notes}" \
              --target "${GITHUB_SHA}"
          fi
